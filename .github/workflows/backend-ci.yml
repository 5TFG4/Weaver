name: Backend CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "weaver.py"
      - "alembic.ini"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weaver
          POSTGRES_PASSWORD: weaver
          POSTGRES_DB: weaver_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgresql+asyncpg://weaver:weaver@localhost:5432/weaver_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('docker/backend/requirements.txt', 'docker/backend/requirements.dev.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r docker/backend/requirements.dev.txt

      - name: Ruff lint check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: MyPy type check
        run: mypy src/

      - name: Run database migrations
        run: alembic upgrade head

      - name: Pytest (unit + integration tests with coverage)
        run: pytest -m "not container" --ignore=tests/e2e --cov=src --cov-report=term-missing
