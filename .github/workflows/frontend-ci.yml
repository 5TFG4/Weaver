name: Frontend CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "haro/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: haro

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: haro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint check
        run: bash ../scripts/ci/frontend-lint.sh eslint

      - name: TypeScript check
        run: bash ../scripts/ci/frontend-lint.sh tsc

      - name: Vitest tests with coverage
        run: bash ../scripts/ci/frontend-test.sh vitest

      - name: Vite build
        run: bash ../scripts/ci/frontend-test.sh build
