name: Compose Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docker/**"
      - "src/**"
      - "haro/**"
      - "weaver.py"
      - "pyproject.toml"
      - "alembic.ini"
      - ".github/workflows/compose-smoke.yml"

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare compose env
        shell: bash
        run: |
          cp docker/example.env docker/.env
          sed -i 's|^ALPACA_LIVE_API_KEY=.*|ALPACA_LIVE_API_KEY=|' docker/.env
          sed -i 's|^ALPACA_LIVE_API_SECRET=.*|ALPACA_LIVE_API_SECRET=|' docker/.env
          sed -i 's|^ALPACA_PAPER_API_KEY=.*|ALPACA_PAPER_API_KEY=|' docker/.env
          sed -i 's|^ALPACA_PAPER_API_SECRET=.*|ALPACA_PAPER_API_SECRET=|' docker/.env

      - name: Validate compose config
        run: docker compose -f docker/docker-compose.yml config

      - name: Build backend/frontend images
        run: docker compose -f docker/docker-compose.yml build backend frontend

      - name: Start database
        run: docker compose -f docker/docker-compose.yml up -d db

      - name: Run DB migrations
        run: docker compose -f docker/docker-compose.yml run --rm backend alembic upgrade head

      - name: Start app services
        run: docker compose -f docker/docker-compose.yml up -d backend frontend

      - name: Wait for API health
        shell: bash
        run: |
          set -euo pipefail
          raw_backend_port="$(docker compose -f docker/docker-compose.yml port --index 1 backend 8000)"
          HOST_PORT_PROD="${raw_backend_port##*:}"
          [[ "$HOST_PORT_PROD" =~ ^[0-9]+$ ]] || { echo "Invalid backend host port: $raw_backend_port"; exit 1; }
          for i in {1..60}; do
            code="$(curl -sS -o /tmp/api.out -w "%{http_code}" "http://127.0.0.1:${HOST_PORT_PROD}/api/v1/healthz" || true)"
            if [[ "$code" == "200" ]]; then
              cat /tmp/api.out
              exit 0
            fi
            sleep 2
          done
          echo "API health check failed"
          docker compose -f docker/docker-compose.yml logs backend db
          exit 1

      - name: Wait for frontend
        shell: bash
        run: |
          set -euo pipefail
          raw_frontend_port="$(docker compose -f docker/docker-compose.yml port --index 1 frontend 80)"
          FRONTEND_PORT_PROD="${raw_frontend_port##*:}"
          [[ "$FRONTEND_PORT_PROD" =~ ^[0-9]+$ ]] || { echo "Invalid frontend host port: $raw_frontend_port"; exit 1; }
          for i in {1..60}; do
            code="$(curl -sS -o /tmp/front.out -w "%{http_code}" "http://127.0.0.1:${FRONTEND_PORT_PROD}/" || true)"
            if [[ "$code" == "200" ]]; then
              head -n 5 /tmp/front.out
              exit 0
            fi
            sleep 2
          done
          echo "Frontend smoke check failed"
          docker compose -f docker/docker-compose.yml logs frontend
          exit 1

      - name: Capture container logs
        if: failure()
        run: |
          docker compose -f docker/docker-compose.yml logs --no-color > /tmp/weaver_container_logs.out 2>&1 || true
          cp /tmp/api.out /tmp/weaver_api_response.out 2>/dev/null || true
          cp /tmp/front.out /tmp/weaver_frontend_response.out 2>/dev/null || true

      - name: Teardown
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: compose-smoke-logs
          path: /tmp/weaver_*.out
          retention-days: 7
