name: Compose Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docker/**"
      - "src/**"
      - "haro/**"
      - "weaver.py"
      - "pyproject.toml"
      - "alembic.ini"
      - ".github/workflows/compose-smoke.yml"

permissions:
  contents: read

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compose smoke test
        run: bash scripts/ci/compose-smoke.sh

      - name: Capture container logs
        if: failure()
        run: |
          docker compose -p weaver_smoke -f docker/docker-compose.yml logs --no-color > /tmp/weaver_container_logs.out 2>&1 || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: compose-smoke-logs
          path: /tmp/weaver_*.out
          retention-days: 7
