name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docker/**"
      - "src/**"
      - "haro/**"
      - "tests/e2e/**"
      - "weaver.py"
      - "pyproject.toml"
      - "alembic.ini"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run E2E tests
        run: bash scripts/ci/e2e.sh

      - name: Capture container logs
        if: failure()
        run: |
          docker compose -f docker/docker-compose.e2e.yml logs --no-color > /tmp/weaver_e2e_logs.out 2>&1 || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-test-logs
          path: /tmp/weaver_e2e_logs.out
          retention-days: 7
