# Docker Compose for E2E testing.
# Spins up backend + frontend + db + test-runner in an isolated network.
# Usage:
#   Full run:  docker compose -f docker/docker-compose.e2e.yml run --rm test_runner
#   Debug:     docker compose -f docker/docker-compose.e2e.yml up -d db_e2e backend_e2e frontend_e2e
#              then inspect at http://127.0.0.1:38919/api/v1/healthz

name: weaver-e2e

services:
  db_e2e:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: weaver_e2e_db
      POSTGRES_USER: weaver
      POSTGRES_PASSWORD: weaver_e2e_password
    ports:
      - "35432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weaver -d weaver_e2e_db"]
      interval: 3s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  backend_e2e:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    environment:
      DB_URL: "postgresql+asyncpg://weaver:weaver_e2e_password@db_e2e:5432/weaver_e2e_db"
      ALPACA_LIVE_API_KEY: ""
      ALPACA_LIVE_API_SECRET: ""
      ALPACA_PAPER_API_KEY: ""
      ALPACA_PAPER_API_SECRET: ""
    ports:
      - "38919:8000"
    depends_on:
      db_e2e:
        condition: service_healthy
    networks:
      default:
        aliases:
          - backend
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn weaver:app --host 0.0.0.0 --port 8000",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthz')",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  frontend_e2e:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "33579:80"
    depends_on:
      backend_e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  test_runner:
    build:
      context: ..
      dockerfile: docker/e2e/Dockerfile
    environment:
      E2E_BASE_URL: "http://frontend_e2e:80"
      E2E_API_BASE_URL: "http://backend_e2e:8000/api/v1"
      E2E_DB_URL: "postgresql://weaver:weaver_e2e_password@db_e2e:5432/weaver_e2e_db"
    depends_on:
      frontend_e2e:
        condition: service_healthy
      backend_e2e:
        condition: service_healthy
    profiles:
      - test
